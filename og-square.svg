<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5f0"/>
      <stop offset="100%" stop-color="#e8e4dc"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#5a4ac0"/>
    </linearGradient>
    <linearGradient id="panelbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#f2f0ea" stop-opacity="0.96"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#badge)"/>

  <!-- ── TOP: brand ── -->
  <rect x="80" y="60" width="240" height="46" rx="23" fill="url(#badge)"/>
  <text x="200" y="90" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="19" font-weight="700" fill="white" text-anchor="middle">GeoGenius</text>

  <!-- ── TITLE ── -->
  <text x="600" y="198" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="100" font-weight="700" fill="#1a1814" text-anchor="middle" letter-spacing="-2">让公式</text>
  <text x="600" y="306" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="100" font-weight="700" fill="#1a5fa8" text-anchor="middle" letter-spacing="-2">看得见</text>

  <!-- divider -->
  <line x1="200" y1="338" x2="1000" y2="338" stroke="#d4cfc5" stroke-width="2"/>

  <!-- subtitle -->
  <text x="600" y="386" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="30" fill="#6b6760" text-anchor="middle">小学几何公式动画推导 · AI 讲解 · 变式练习</text>

  <!-- ── CENTER: animation panel mockup ── -->
  <!-- shadow -->
  <rect x="138" y="428" width="924" height="560" rx="20" fill="#1a1814" opacity="0.10"/>
  <!-- panel -->
  <rect x="130" y="420" width="924" height="560" rx="20" fill="url(#panelbg)" stroke="#ccc9bf" stroke-width="1.5"/>
  <!-- panel top bar -->
  <rect x="130" y="420" width="924" height="52" rx="20" fill="url(#badge)" opacity="0.92"/>
  <rect x="130" y="452" width="924" height="20" fill="url(#badge)" opacity="0.92"/>
  <!-- dots -->
  <circle cx="166" cy="446" r="7" fill="white" opacity="0.4"/>
  <circle cx="192" cy="446" r="7" fill="white" opacity="0.4"/>
  <circle cx="218" cy="446" r="7" fill="white" opacity="0.4"/>
  <!-- bar title -->
  <text x="592" y="453" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="18" font-weight="600" fill="white" text-anchor="middle" opacity="0.95">圆的面积 · 3/4　　等分越多，越接近长方形</text>

  <!-- ── circle ── -->
  <circle cx="380" cy="600" r="110" fill="#FFD060" fill-opacity="0.28" stroke="#B08000" stroke-width="3"/>
  <!-- 8 sector lines -->
  <line x1="380" y1="490" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="458" y1="522" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="490" y1="600" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="458" y1="678" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="380" y1="710" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="302" y1="678" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="270" y1="600" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <line x1="302" y1="522" x2="380" y2="600" stroke="#B08000" stroke-width="2" opacity="0.55"/>
  <!-- r label -->
  <line x1="380" y1="600" x2="490" y2="600" stroke="#1A5FA8" stroke-width="2.5" stroke-dasharray="5,4"/>
  <text x="437" y="590" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="18" font-weight="700" fill="#1A5FA8" text-anchor="middle">r</text>

  <!-- arrow -->
  <text x="560" y="615" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="28" fill="#9a5800" text-anchor="middle" opacity="0.75">&#8594;</text>

  <!-- ── rearranged sectors ── -->
  <!-- Up sectors (gold) -->
  <polygon points="630,690 660,540 690,690" fill="#FFD060" stroke="#B08000" stroke-width="1.5"/>
  <polygon points="690,690 720,540 750,690" fill="#FFD060" stroke="#B08000" stroke-width="1.5"/>
  <polygon points="750,690 780,540 810,690" fill="#FFD060" stroke="#B08000" stroke-width="1.5"/>
  <polygon points="810,690 840,540 870,690" fill="#FFD060" stroke="#B08000" stroke-width="1.5"/>
  <!-- Down sectors (blue) -->
  <polygon points="660,540 690,690 720,540" fill="#AACCE8" stroke="#3078B8" stroke-width="1.5"/>
  <polygon points="720,540 750,690 780,540" fill="#AACCE8" stroke="#3078B8" stroke-width="1.5"/>
  <polygon points="780,540 810,690 840,540" fill="#AACCE8" stroke="#3078B8" stroke-width="1.5"/>
  <polygon points="840,540 870,690 900,540" fill="#AACCE8" stroke="#3078B8" stroke-width="1.5"/>

  <!-- width brace -->
  <line x1="630" y1="710" x2="900" y2="710" stroke="#1A5FA8" stroke-width="2"/>
  <line x1="630" y1="704" x2="630" y2="716" stroke="#1A5FA8" stroke-width="2"/>
  <line x1="900" y1="704" x2="900" y2="716" stroke="#1A5FA8" stroke-width="2"/>
  <text x="765" y="736" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="17" font-weight="600" fill="#1A5FA8" text-anchor="middle">长 ≈ πr</text>
  <!-- height label -->
  <line x1="912" y1="540" x2="912" y2="690" stroke="#C03030" stroke-width="2"/>
  <line x1="906" y1="540" x2="918" y2="540" stroke="#C03030" stroke-width="2"/>
  <line x1="906" y1="690" x2="918" y2="690" stroke="#C03030" stroke-width="2"/>
  <text x="938" y="620" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="17" font-weight="600" fill="#C03030">宽=r</text>

  <!-- formula box -->
  <rect x="560" y="758" width="450" height="64" rx="12" fill="#1a5fa8" fill-opacity="0.09" stroke="#1a5fa8" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="785" y="799" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="28" font-weight="700" fill="#1A5FA8" text-anchor="middle">S = πr × r = πr²</text>

  <!-- step dots -->
  <circle cx="542" cy="950" r="9" fill="#d4d0c8"/>
  <circle cx="568" cy="950" r="9" fill="#d4d0c8"/>
  <circle cx="594" cy="950" r="12" fill="#1a5fa8"/>
  <circle cx="622" cy="950" r="9" fill="#d4d0c8"/>

  <!-- ── BOTTOM: stats ── -->
  <g font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="26" font-weight="600">
    <rect x="198" y="1020" width="230" height="52" rx="10" fill="#e8f1fb"/>
    <text x="313" y="1053" fill="#1a5fa8" text-anchor="middle">一至六年级</text>
    <rect x="448" y="1020" width="200" height="52" rx="10" fill="#EEECFE"/>
    <text x="548" y="1053" fill="#5a4ac0" text-anchor="middle">35 知识点</text>
    <rect x="664" y="1020" width="240" height="52" rx="10" fill="#FEF0DC"/>
    <text x="784" y="1053" fill="#9a5800" text-anchor="middle">144 动画步骤</text>
  </g>

  <!-- URL -->
  <text x="600" y="1140" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="22" fill="#9e9b96" text-anchor="middle" opacity="0.7">geogenius.xiaole.app</text>
</svg>
