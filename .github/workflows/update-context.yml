name: 自动更新 CONTEXT.md

on:
  push:
    branches: ["**"]
    paths-ignore:
      - 'CONTEXT.md'

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 更新 CONTEXT.md
        run: |
          python3 << 'PYEOF'
          import re, subprocess, os

          def sh(cmd):
              return subprocess.check_output(cmd, shell=True).decode().strip()

          sha    = sh("git rev-parse --short HEAD")
          msg    = sh("git log -1 --pretty=%s")
          time   = sh("git log -1 --pretty=%cd --date=format:'%Y-%m-%d %H:%M'")
          author = sh("git log -1 --pretty=%an")
          branch = os.environ.get("GITHUB_REF_NAME", "main")
          size   = sh("wc -c < index.html | tr -d ' '")
          lines  = sh("wc -l < index.html | tr -d ' '")

          html = open("index.html").read()
          topics = str(len(re.findall(r"id: '[a-z_0-9]+'", html)))
          steps  = str(sum(int(x) for x in re.findall(r"steps:\s*(\d+)", html)))

          with open("CONTEXT.md") as f:
              c = f.read()

          ns = (
              f"## 当前状态（最后更新：{time}）\n\n"
              f"- **知识点**：{topics} 个，{steps} 个动画步骤\n"
              f"- **当前分支**：{branch} / `{sha}` — {msg}\n"
              f"- **index.html 大小**：{size} 字节 / {lines} 行\n"
              f"- **Cloudflare 部署分支**：main\n"
              f"- **最后提交者**：{author} @ {time}"
          )

          c = re.sub(r"## 当前状态.*?(?=\n## )", ns + "\n\n", c, flags=re.DOTALL)
          open("CONTEXT.md", "w").write(c)
          print("CONTEXT.md 更新成功")
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTEXT.md
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "docs(auto): 自动更新 CONTEXT.md [skip ci]"
            git push
          fi
