name: 自动更新 CONTEXT.md

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CONTEXT.md'

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 更新 CONTEXT.md
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_TIME=$(git log -1 --pretty=%cd --date=format:'%Y-%m-%d %H:%M')
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          FILE_SIZE=$(wc -c < index.html | tr -d ' ')
          FILE_LINES=$(wc -l < index.html | tr -d ' ')
          TOPIC_COUNT=$(grep -o '<div class="stat-n">[0-9]*</div>' index.html | head -1 | grep -o '[0-9]*')
          STEP_COUNT=$(grep -o '<div class="stat-n">[0-9]*</div>' index.html | sed -n '2p' | grep -o '[0-9]*')

          python3 << PYEOF
          import re

          with open('CONTEXT.md', 'r') as f:
              content = f.read()

          new_status = f"""## 当前状态（最后更新：${COMMIT_TIME}）

- **知识点**：${TOPIC_COUNT} 个，${STEP_COUNT} 个动画步骤
- **main 分支最新 commit**：\`${COMMIT_SHA}\` — ${COMMIT_MSG}
- **index.html 大小**：${FILE_SIZE} 字节 / ${FILE_LINES} 行
- **Cloudflare 部署分支**：\`main\`
- **最后提交者**：${COMMIT_AUTHOR} @ ${COMMIT_TIME}"""

          content = re.sub(
              r'## 当前状态.*?(?=\n## )',
              new_status + '\n\n',
              content,
              flags=re.DOTALL
          )

          with open('CONTEXT.md', 'w') as f:
              f.write(content)

          print("✅ CONTEXT.md 更新成功")
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTEXT.md
          if git diff --staged --quiet; then
            echo "无变化，跳过"
          else
            git commit -m "docs(auto): 自动更新 CONTEXT.md [skip ci]"
            git push
          fi
