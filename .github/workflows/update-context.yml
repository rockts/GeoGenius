name: 自动更新 CONTEXT.md

on:
  push:
    branches: ["**"]
    paths-ignore:
      - 'CONTEXT.md'

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 收集信息
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --pretty=%cd --date=format:'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)" >> $GITHUB_ENV
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "FILE_SIZE=$(wc -c < index.html | tr -d ' ')" >> $GITHUB_ENV
          echo "FILE_LINES=$(wc -l < index.html | tr -d ' ')" >> $GITHUB_ENV
          echo "TOPIC_COUNT=$(python3 -c \"import re; s=open('index.html').read(); print(len(re.findall(r\\\"id: '[^']+'\\\", s)))\")" >> $GITHUB_ENV
          echo "STEP_COUNT=$(python3 -c \"import re; s=open('index.html').read(); print(sum(map(int, re.findall(r\\\"steps: (\\\\d+)\\\", s))))\")" >> $GITHUB_ENV

      - name: 写入 CONTEXT.md
        run: |
          python3 -c "
          import re, os
          sha    = os.environ['COMMIT_SHA']
          msg    = os.environ['COMMIT_MSG']
          time   = os.environ['COMMIT_TIME']
          author = os.environ['COMMIT_AUTHOR']
          branch = os.environ['BRANCH_NAME']
          size   = os.environ['FILE_SIZE']
          lines  = os.environ['FILE_LINES']
          topics = os.environ['TOPIC_COUNT']
          steps  = os.environ['STEP_COUNT']
          with open('CONTEXT.md') as f:
              c = f.read()
          ns = ('## 当前状态（最后更新：' + time + '）\n\n'
              + '- **知识点**：' + topics + ' 个，' + steps + ' 个动画步骤\n'
              + '- **当前分支最新 commit**：' + branch + ' / ' + sha + ' — ' + msg + '\n'
              + '- **index.html 大小**：' + size + ' 字节 / ' + lines + ' 行\n'
              + '- **Cloudflare 部署分支**：main\n'
              + '- **最后提交者**：' + author + ' @ ' + time)
          c = re.sub(r'## 当前状态.*?(?=\n## )', ns + '\n\n', c, flags=re.DOTALL)
          open('CONTEXT.md','w').write(c)
          print('done')
          "

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTEXT.md
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "docs(auto): 自动更新 CONTEXT.md [skip ci]"
            git push
          fi
