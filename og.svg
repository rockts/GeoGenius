<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5f0"/>
      <stop offset="100%" stop-color="#ede9e0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#5a4ac0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#badge)"/>

  <!-- ── right: decorative geometry shapes ── -->

  <!-- large circle (outline) -->
  <circle cx="920" cy="295" r="210" fill="none" stroke="#1a5fa8" stroke-width="3" opacity="0.18"/>
  <circle cx="920" cy="295" r="155" fill="#1a5fa8" opacity="0.07"/>

  <!-- parallelogram -->
  <polygon points="760,460 1010,460 1060,530 810,530" fill="#5a4ac0" opacity="0.13"/>
  <polygon points="760,460 1010,460 1060,530 810,530" fill="none" stroke="#5a4ac0" stroke-width="2.5" opacity="0.35"/>

  <!-- triangle -->
  <polygon points="920,100 1140,490 700,490" fill="none" stroke="#1a5fa8" stroke-width="3" opacity="0.22"/>
  <polygon points="920,100 1140,490 700,490" fill="#1a5fa8" opacity="0.04"/>

  <!-- right angle mark -->
  <polyline points="820,490 820,455 855,455" fill="none" stroke="#9a5800" stroke-width="3" opacity="0.5"/>

  <!-- inscribed circle -->
  <circle cx="920" cy="390" r="72" fill="none" stroke="#9a5800" stroke-width="2.5" opacity="0.28"/>

  <!-- small colored dots accent -->
  <circle cx="700" cy="490" r="9" fill="#1a5fa8" opacity="0.6"/>
  <circle cx="1140" cy="490" r="9" fill="#1a5fa8" opacity="0.6"/>
  <circle cx="920" cy="100" r="9" fill="#1a5fa8" opacity="0.6"/>

  <!-- grid dots (subtle) -->
  <g opacity="0.08" fill="#1a1814">
    <circle cx="650" cy="160" r="3"/><circle cx="700" cy="160" r="3"/><circle cx="750" cy="160" r="3"/>
    <circle cx="650" cy="210" r="3"/><circle cx="700" cy="210" r="3"/><circle cx="750" cy="210" r="3"/>
    <circle cx="650" cy="260" r="3"/><circle cx="700" cy="260" r="3"/><circle cx="750" cy="260" r="3"/>
  </g>

  <!-- ── left: text content ── -->

  <!-- badge pill -->
  <rect x="72" y="72" width="200" height="38" rx="19" fill="url(#badge)"/>
  <text x="172" y="97" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="700" fill="white" text-anchor="middle">GeoGenius · v1.2</text>

  <!-- main title line 1 -->
  <text x="72" y="210" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="88" font-weight="700" fill="#1a1814" letter-spacing="-2">几何直观</text>

  <!-- main title line 2 -->
  <text x="72" y="305" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="64" font-weight="700" fill="#1a5fa8" letter-spacing="-1">AI 学习助手</text>

  <!-- divider -->
  <line x1="72" y1="338" x2="560" y2="338" stroke="#d4d0c8" stroke-width="1.5"/>

  <!-- subtitle -->
  <text x="72" y="382" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="28" fill="#6b6760" letter-spacing="1">小学图形与几何动态演示学习工具</text>

  <!-- stats row -->
  <g font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600">
    <!-- stat 1 -->
    <rect x="72" y="418" width="110" height="44" rx="8" fill="#e8f1fb"/>
    <text x="127" y="446" fill="#1a5fa8" text-anchor="middle">6 年级</text>
    <!-- stat 2 -->
    <rect x="196" y="418" width="140" height="44" rx="8" fill="#EEECFE"/>
    <text x="266" y="446" fill="#5a4ac0" text-anchor="middle">35 知识点</text>
    <!-- stat 3 -->
    <rect x="350" y="418" width="160" height="44" rx="8" fill="#FEF0DC"/>
    <text x="430" y="446" fill="#9a5800" text-anchor="middle">144 动画步骤</text>
  </g>

  <!-- tagline -->
  <text x="72" y="530" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="21" fill="#9e9b96">依据义务教育数学课程标准（2022年版）· 配合 AI 讲解与变式练习</text>

  <!-- bottom right: URL -->
  <text x="1130" y="598" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#9e9b96" text-anchor="end" opacity="0.7">rockts.github.io/GeoGenius</text>
</svg>
