<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5f0"/>
      <stop offset="100%" stop-color="#ede9e0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#5a4ac0"/>
    </linearGradient>
    <linearGradient id="panelbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#f0eee8" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#badge)"/>

  <!-- ── RIGHT: app panel mockup ── -->
  <!-- panel shadow -->
  <rect x="628" y="48" width="532" height="534" rx="18" fill="#1a1814" opacity="0.10"/>
  <!-- panel body -->
  <rect x="622" y="42" width="532" height="534" rx="18" fill="url(#panelbg)" stroke="#d4cfc5" stroke-width="1.5"/>

  <!-- panel top bar -->
  <rect x="622" y="42" width="532" height="44" rx="18" fill="#1a5fa8" opacity="0.92"/>
  <rect x="622" y="68" width="532" height="18" fill="#1a5fa8" opacity="0.92"/>
  <!-- top bar dots -->
  <circle cx="650" cy="64" r="6" fill="white" opacity="0.4"/>
  <circle cx="672" cy="64" r="6" fill="white" opacity="0.4"/>
  <circle cx="694" cy="64" r="6" fill="white" opacity="0.4"/>
  <!-- top bar title -->
  <text x="888" y="70" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">圆的面积 · 3/4</text>

  <!-- step label -->
  <text x="658" y="116" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="13" fill="#6b6760">等分越多，越接近长方形</text>

  <!-- ── circle at top of panel ── -->
  <circle cx="760" cy="178" r="62" fill="#FFD060" fill-opacity="0.25" stroke="#B08000" stroke-width="2.5"/>
  <!-- circle sector lines (8 sectors) -->
  <line x1="760" y1="116" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="804" y1="131" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="822" y1="178" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="804" y1="225" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="760" y1="240" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="716" y1="225" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="698" y1="178" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <line x1="716" y1="131" x2="760" y2="178" stroke="#B08000" stroke-width="1.5" opacity="0.6"/>
  <!-- r label -->
  <line x1="760" y1="178" x2="822" y2="178" stroke="#1A5FA8" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="793" y="172" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="14" font-weight="700" fill="#1A5FA8" text-anchor="middle">r</text>

  <!-- arrow down -->
  <text x="760" y="268" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="22" fill="#9a5800" text-anchor="middle" opacity="0.7">&#8595; 剪开展平</text>

  <!-- ── rearranged sectors (parallelogram shape) ── -->
  <!-- 8 alternating up/down sectors as trapezoids approximation -->
  <!-- Up sectors (gold) -->
  <polygon points="660,370 685,290 710,370" fill="#FFD060" stroke="#B08000" stroke-width="1.2"/>
  <polygon points="710,370 735,290 760,370" fill="#FFD060" stroke="#B08000" stroke-width="1.2"/>
  <polygon points="760,370 785,290 810,370" fill="#FFD060" stroke="#B08000" stroke-width="1.2"/>
  <polygon points="810,370 835,290 860,370" fill="#FFD060" stroke="#B08000" stroke-width="1.2"/>
  <!-- Down sectors (blue) -->
  <polygon points="685,290 710,370 735,290" fill="#AACCE8" stroke="#3078B8" stroke-width="1.2"/>
  <polygon points="735,290 760,370 785,290" fill="#AACCE8" stroke="#3078B8" stroke-width="1.2"/>
  <polygon points="785,290 810,370 835,290" fill="#AACCE8" stroke="#3078B8" stroke-width="1.2"/>
  <polygon points="835,290 860,370 885,290" fill="#AACCE8" stroke="#3078B8" stroke-width="1.2"/>

  <!-- dimension labels -->
  <!-- width brace -->
  <line x1="660" y1="382" x2="885" y2="382" stroke="#1A5FA8" stroke-width="1.5"/>
  <line x1="660" y1="378" x2="660" y2="386" stroke="#1A5FA8" stroke-width="1.5"/>
  <line x1="885" y1="378" x2="885" y2="386" stroke="#1A5FA8" stroke-width="1.5"/>
  <text x="772" y="397" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="13" font-weight="600" fill="#1A5FA8" text-anchor="middle">长 ≈ πr</text>
  <!-- height label -->
  <line x1="892" y1="290" x2="892" y2="370" stroke="#C03030" stroke-width="1.5"/>
  <line x1="888" y1="290" x2="896" y2="290" stroke="#C03030" stroke-width="1.5"/>
  <line x1="888" y1="370" x2="896" y2="370" stroke="#C03030" stroke-width="1.5"/>
  <text x="910" y="335" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="13" font-weight="600" fill="#C03030">宽=r</text>

  <!-- formula result -->
  <rect x="648" y="415" width="290" height="52" rx="10" fill="#1a5fa8" opacity="0.08" stroke="#1a5fa8" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="793" y="448" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="22" font-weight="700" fill="#1A5FA8" text-anchor="middle">S = πr × r = πr²</text>

  <!-- step dots -->
  <circle cx="744" cy="502" r="7" fill="#d4d0c8"/>
  <circle cx="764" cy="502" r="7" fill="#d4d0c8"/>
  <circle cx="784" cy="502" r="9" fill="#1a5fa8"/>
  <circle cx="804" cy="502" r="7" fill="#d4d0c8"/>

  <!-- hint text -->
  <text x="888" y="538" font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="12" fill="#9e9b96" text-anchor="middle">分成 32 份时已非常接近长方形</text>

  <!-- ── LEFT: text content ── -->

  <!-- badge pill -->
  <rect x="72" y="72" width="210" height="38" rx="19" fill="url(#badge)"/>
  <text x="177" y="97" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="17" font-weight="700" fill="white" text-anchor="middle">GeoGenius · v1.3</text>

  <!-- main hook -->
  <text x="72" y="200" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="80" font-weight="700" fill="#1a1814" letter-spacing="-1">让公式</text>
  <text x="72" y="290" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="80" font-weight="700" fill="#1a5fa8" letter-spacing="-1">看得见</text>

  <!-- divider -->
  <line x1="72" y1="320" x2="540" y2="320" stroke="#d4d0c8" stroke-width="1.5"/>

  <!-- subtitle -->
  <text x="72" y="362" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="26" fill="#6b6760">小学几何公式动画推导工具</text>

  <!-- stats row -->
  <g font-family="'Source Han Sans CN','Heiti SC',sans-serif" font-size="21" font-weight="600">
    <rect x="72" y="398" width="110" height="42" rx="8" fill="#e8f1fb"/>
    <text x="127" y="425" fill="#1a5fa8" text-anchor="middle">6 年级</text>
    <rect x="196" y="398" width="150" height="42" rx="8" fill="#EEECFE"/>
    <text x="271" y="425" fill="#5a4ac0" text-anchor="middle">35 知识点</text>
    <rect x="360" y="398" width="175" height="42" rx="8" fill="#FEF0DC"/>
    <text x="447" y="425" fill="#9a5800" text-anchor="middle">144 动画步骤</text>
  </g>

  <!-- tagline -->
  <text x="72" y="510" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="20" fill="#9e9b96">分步动画 · AI 讲解 · 变式练习，课堂即用</text>

  <!-- bottom right: URL -->
  <text x="1148" y="600" font-family="'Source Han Sans CN','Heiti SC',sans-serif"
        font-size="17" fill="#9e9b96" text-anchor="end" opacity="0.7">geogenius.xiaole.app</text>
</svg>
